name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  contract:
    name: Compile contract & run contract tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install root dependencies
        run: npm install
      - name: Install Compact compiler
        run: curl --proto '=https' --tlsv1.2 -LsSf https://github.com/midnightntwrk/compact/releases/latest/download/compact-installer.sh | sh
      - name: Add Compact compiler to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Set default Compact compiler
        run: compact update
      - name: Compile contract
        run: npm run compile
      - name: Run contract tests
        run: npm test
  frontend:
    name: Frontend build & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Lint
        working-directory: frontend
        run: npm run lint
      - name: Run frontend tests
        working-directory: frontend
        run: npm test
      - name: Build
        working-directory: frontend
        run: npm run build
